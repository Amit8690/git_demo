<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName"  value="John Doe" readonly>
        <br>
        <label for="nickName">Nick Name</label>
        <input type="text" id="nickName" placeholder="Sacheev ji">
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" min="8">
        <br>
        <label for="Email">Email address</label>
        <input type="email" id="Email">
        <br>
        <label for="age">Age</label>
        <input type="number" id="age" min="18" max="60">
        <br>
        <label for="submit">Register</label>
        <button type="submit" id="submit">
    </form>
</body>
</html>
